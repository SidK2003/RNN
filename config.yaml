# ============================================
# NIFTY 50 Deep RL Trading System — Config
# ============================================

stocks:
  - name: RELIANCE
    file: Data/historical_data/reliance_daily.csv
    start_date: "2000-01-03"
  - name: TCS
    file: Data/historical_data/tcs_daily.csv
    start_date: "2004-08-25"
  - name: HDFCBANK
    file: Data/historical_data/hdfcbank_daily.csv
    start_date: "2003-01-01"
  - name: HINDUNILVR
    file: Data/historical_data/hindunilvr_daily.csv
    start_date: "2003-01-27"
  - name: SUNPHARMA
    file: Data/historical_data/sunpharma_daily.csv
    start_date: "2003-01-01"

# NIFTY50 index data (bonus — not used for training in MVP)
nifty50:
  file: Data/historical_data/nifty50_daily.csv

vix:
  file: Data/historical_data/india_vix_daily.csv
  available_from: "2009-03-02"

target:
  horizon: 5              # predict N-day forward return
  neutral_zone: 0.005     # ±0.5% — sideways moves labeled as neutral (-1.0)

walk_forward:
  train_years: 10
  test_years: 2
  step_years: 2

model:
  seq_length: 15          # Optuna best (trial 12) — shorter works better for 5-day horizon
  hidden_size: 32         # Optuna best — small but sufficient with 8 heads
  num_layers: 3           # Optuna best — deeper GRU captures more patterns
  num_heads: 8            # Optuna best — more attention diversity
  dropout: 0.50           # Optuna best — heavy regularization for noisy financial data
  learning_rate: 0.00118  # Optuna best — 10x higher than previous
  weight_decay: 0.000794  # Optuna best — significant L2 regularization
  batch_size: 32          # Optuna best — smaller batches for better generalization
  max_epochs: 100
  early_stopping_patience: 10
  mc_dropout_passes: 50
  ensemble_count: 3       # Number of models in ensemble (1 = no ensemble)

rl:
  algorithm: MaskablePPO
  total_timesteps: 200000
  learning_rate: 0.0003   # Optuna-tunable
  clip_range: 0.2         # Optuna-tunable
  ent_coef: 0.01          # Optuna-tunable
  n_steps: 1024           # Optuna-tunable
  confidence_threshold: 0.6  # Optuna-tunable

costs:
  brokerage_pct: 0.001    # 0.1%
  stt_pct: 0.0001         # 0.01% on sell
  slippage_pct: 0.0005    # 0.05%

gpu:
  mixed_precision: true
  gradient_accumulation_steps: 1
  pin_memory: true

seed: 42

results_dir: results/
